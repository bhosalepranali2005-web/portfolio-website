<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Blogging Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Blogging Platform</h1>
    </header>

    <div class="container">

        <div class="form-section">
            <input type="text" id="title" placeholder="Enter Blog Title">
            <textarea id="content" placeholder="Write your blog here..."></textarea>
            <button onclick="addPost()">Publish</button>
        </div>

        <h2>Published Posts</h2>
        <div id="posts"></div>

    </div>

<script src="script.js"></script>
</body>
</html>
