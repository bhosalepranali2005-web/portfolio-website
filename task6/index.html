<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Web Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Interactive Web Application</h1>
        <button id="modeToggle">Toggle Dark Mode</button>
    </header>

    <div class="container">

        <!-- Live Greeting -->
        <section class="card">
            <h2>Live Greeting</h2>
            <input type="text" id="username" placeholder="Enter your name">
            <p id="greeting"></p>
        </section>

        <!-- Character Counter -->
        <section class="card">
            <h2>Character Counter</h2>
            <textarea id="textInput" placeholder="Type something..."></textarea>
            <p>Characters: <span id="charCount">0</span></p>
        </section>

        <!-- Real Time Clock -->
        <section class="card">
            <h2>Real-Time Clock</h2>
            <p id="clock"></p>
        </section>

        <!-- To Do List -->
        <section class="card">
            <h2>To-Do List</h2>
            <input type="text" id="taskInput" placeholder="Enter task">
            <button onclick="addTask()">Add Task</button>
            <ul id="taskList"></ul>
        </section>

    </div>

<script src="script.js"></script>
</body>
</html>
