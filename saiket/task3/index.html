<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Navigation Menu</title>

<style>

/* ====== GLOBAL STYLES ====== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f4f4f4;
}

/* ====== NAVIGATION BAR ====== */
nav{
    background:#2c3e50;
    padding:15px 0;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}

nav ul{
    list-style:none;
    display:flex;
    justify-content:center;
}

nav ul li{
    margin:0 20px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:18px;
    padding:8px 12px;
    transition:0.3s;
}

nav ul li a:hover{
    background:#1abc9c;
    border-radius:5px;
}

/* ====== SECTIONS ====== */
section{
    height:100vh;
    padding-top:80px;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#home{
    background:#3498db;
    color:white;
}

#about{
    background:#e67e22;
    color:white;
}

#services{
    background:#9b59b6;
    color:white;
}

#contact{
    background:#2ecc71;
    color:white;
}

section h1{
    font-size:40px;
    margin-bottom:15px;
}

section p{
    font-size:18px;
    width:60%;
}

/* ====== RESPONSIVE ====== */
@media(max-width:768px){
    nav ul{
        flex-direction:column;
        text-align:center;
    }
    
    nav ul li{
        margin:10px 0;
    }

    section p{
        width:90%;
    }
}

</style>
</head>

<body>

<!-- Navigation Menu -->
<nav>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- Sections -->
<section id="home">
    <h1>Home</h1>
    <p>Welcome to our website. This is the home section.</p>
</section>

<section id="about">
    <h1>About</h1>
    <p>This section contains information about our company.</p>
</section>

<section id="services">
    <h1>Services</h1>
    <p>Here you can explore the services we provide.</p>
</section>

<section id="contact">
    <h1>Contact</h1>
    <p>Feel free to contact us for more information.</p>
</section>

</body>
</html>
