<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

<style>

/* ===== GLOBAL STYLING ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4CAF50,#2E8B57);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* ===== FORM CONTAINER ===== */
.form-container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.form-container h2{
    text-align:center;
    margin-bottom:20px;
}

/* ===== INPUT FIELDS ===== */
.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input[type="text"],
input[type="email"],
select,
textarea{
    width:100%;
    padding:8px;
    border-radius:5px;
    border:1px solid #ccc;
    outline:none;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#4CAF50;
}

/* ===== RADIO & CHECKBOX ===== */
.options{
    margin-bottom:15px;
}

.options label{
    font-weight:normal;
    margin-right:10px;
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:10px;
    background:#2E8B57;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#246b45;
}

/* ===== RESPONSIVE ===== */
@media(max-width:450px){
    .form-container{
        width:90%;
    }
}

</style>
</head>

<body>

<div class="form-container">
    <h2>Contact Form</h2>

    <form>

        <!-- Name -->
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <!-- Gender (Radio Buttons) -->
        <div class="form-group options">
            <label>Gender</label>
            <input type="radio" name="gender" required> Male
            <input type="radio" name="gender"> Female
        </div>

        <!-- Interests (Checkboxes) -->
        <div class="form-group options">
            <label>Interests</label>
            <input type="checkbox"> Web Design
            <input type="checkbox"> Development
        </div>

        <!-- Dropdown -->
        <div class="form-group">
            <label>Country</label>
            <select required>
                <option value="">Select Country</option>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
            </select>
        </div>

        <!-- Message -->
        <div class="form-group">
            <label>Message</label>
            <textarea rows="4" placeholder="Write your message..." required></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
