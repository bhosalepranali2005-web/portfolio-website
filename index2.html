<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2: E-commerce Product Page</title>
    <style>
        /* --- CSS STYLING --- */
        :root {
            --primary-blue: #3498db;
            --success-green: #2ecc71;
            --text-dark: #2c3e50;
            --bg-light: #f4f7f6;
            --star-gold: #f1c40f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Product Card Container */
        .product-card {
            background: #fff;
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: row; /* Desktop side-by-side */
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Left Side: Product Image */
        .product-image {
            flex: 1;
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .product-image img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .product-image:hover img {
            transform: scale(1.05); /* Slight zoom for interactivity */
        }

        /* Right Side: Product Details */
        .product-details {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-logo {
            width: 150px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 28px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        /* Rating Stars */
        .rating {
            color: var(--star-gold);
            font-size: 18px;
            margin-bottom: 15px;
        }

        .rating span {
            color: #888;
            font-size: 14px;
            margin-left: 5px;
        }

        .price {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-blue);
            margin-bottom: 20px;
        }

        .description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Add to Cart Button */
        .cart-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .cart-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .cart-btn:active {
            transform: translateY(0);
        }

        /* Success Message Styling */
        #cart-message {
            display: none;
            margin-top: 15px;
            color: var(--success-green);
            font-weight: bold;
            text-align: center;
        }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            .product-card {
                flex-direction: column;
            }
            .product-image {
                min-height: 300px;
            }
            .product-details {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="product-card">
        <div class="product-image">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=600" alt="Premium Watch">
        </div>

        <div class="product-details">
            <h1 id="product-name">Premium Minimalist Watch</h1>
            
            <div class="rating">
                ★★★★★ <span>(128 Customer Reviews)</span>
            </div>

            <p class="price">$199.00</p>
            
            <p class="description">
                Elevate your style with our flagship timepiece. Featuring a scratch-resistant sapphire crystal, genuine Italian leather strap, and a Japanese quartz movement for precision you can trust.
            </p>

            <button class="cart-btn" onclick="addToCart()">Add to Cart</button>
            <p id="cart-message">Item added to your cart!</p>
        </div>
    </div>

    <script>
        // Simple Interaction Logic
        function addToCart() {
            const message = document.getElementById('cart-message');
            message.style.display = 'block';
            
            // Revert message after 3 seconds
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
            
            console.log("Item added to cart.");
        }
    </script>

</body>
</html>
